backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "promotions"
    label: "Promotions"
    files:
      - label: "Promo Banner & Specials"
        name: "promotions"
        file: "content/promotions.json"
        fields:
          - label: "Banner"
            name: "banner"
            widget: "object"
            fields:
              - { label: "Show Banner", name: "show", widget: "boolean", default: false }
              - { label: "Banner Text", name: "text", widget: "string" }
              - { label: "Banner Link", name: "link", widget: "string", default: "#book-form" }
          - label: "Specials"
            name: "specials"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Detail", name: "detail", widget: "string" }
              - { label: "Code", name: "code", widget: "string", required: false }

  - name: "availability"
    label: "Booking Availability"
    files:
      - label: "Available Booking Dates"
        name: "availability"
        file: "content/availability.json"
        description: "The dates customers can pick on the booking form. Add or remove dates from the list — only these will be selectable. Remove past dates when they're gone."
        fields:
          - label: "Unavailable message"
            name: "message"
            widget: "string"
            required: false
            default: "That date isn't available — please choose another from the list."
          - label: "Available dates"
            name: "dates"
            label_singular: "Date"
            widget: "list"
            required: false
            field:
              label: "Date"
              name: "date"
              widget: "datetime"
              date_format: "YYYY-MM-DD"
              time_format: false
              picker_utc: true

  - name: "services"
    label: "Featured Services"
    files:
      - label: "Homepage Services"
        name: "services"
        file: "content/services.json"
        fields:
          - label: "Services"
            name: "services"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "blurb", widget: "string" }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Featured", name: "featured", widget: "boolean", default: false }
              - { label: "Tag", name: "tag", widget: "string", required: false }
