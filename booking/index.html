<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book — Angel's Lash Studio</title>
  <meta name="description" content="Book your lash appointment at Angel's Lash Studio. Choose your set, pick a date and time, and we'll confirm your slot.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/light/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background:
      radial-gradient(120% 80% at 50% 0%, #2a1840 0%, #0e0716 60%);
      font-family: var(--font-sans); display: flex; align-items: center; justify-content: center; padding: 24px;
      -webkit-font-smoothing: antialiased; }

    .phone { width: 400px; max-width: 100%; height: 840px; max-height: 94vh; background: var(--ink-900);
      border: 1px solid var(--line); border-radius: 38px; overflow: hidden; display: flex; flex-direction: column;
      box-shadow: var(--shadow-lg); position: relative; }

    .bk-status { display: flex; justify-content: space-between; align-items: center; padding: 14px 26px 6px;
      font-size: 12px; font-weight: 500; color: var(--fg-1); }
    .bk-status__r { display: flex; gap: 7px; font-size: 14px; }

    .bk-appbar { display: flex; align-items: center; justify-content: space-between; padding: 6px 20px 4px; min-height: 44px; }
    .bk-logo { width: 34px; }
    .bk-back { width: 38px; height: 38px; border-radius: 999px; border: 1px solid var(--line); background: var(--ink-800);
      color: var(--fg-1); font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: background var(--dur-base); }
    .bk-back:hover { background: var(--ink-700); }
    .bk-appbar__title { font-size: 11px; letter-spacing: .24em; text-transform: uppercase; color: var(--fg-3); }
    .bk-appbar__spacer { width: 38px; }

    .bk-head { padding: 10px 24px 14px; }
    .bk-h2 { font-family: var(--font-display); font-weight: 600; font-size: 2rem; color: var(--fg-1); margin: 14px 0 0; line-height: 1.04; }
    .bk-dots { display: flex; gap: 7px; }
    .bk-dot { width: 26px; height: 3px; border-radius: 999px; background: var(--ink-600); transition: background var(--dur-base); }
    .bk-dot.on { background: var(--grad-violet-soft); }
    .bk-eb { font-size: 10.5px; letter-spacing: .2em; text-transform: uppercase; color: var(--violet-400); font-weight: 500; margin: 18px 0 12px; }

    .bk-screen { flex: 1; overflow-y: auto; padding: 0 24px 16px; }
    .bk-screen::-webkit-scrollbar { width: 0; }

    .bk-svc { width: 100%; display: flex; gap: 14px; text-align: left; background: var(--ink-800);
      border: 1px solid var(--line); border-radius: var(--radius-md); padding: 16px; margin-bottom: 10px; cursor: pointer;
      transition: border-color var(--dur-base), background var(--dur-base), box-shadow var(--dur-base); }
    .bk-svc:hover { border-color: var(--line-strong); }
    .bk-svc.sel { border-color: transparent; box-shadow: var(--glow-violet);
      background: linear-gradient(180deg, rgba(157,95,217,.14), var(--ink-800) 70%); }
    .bk-svc__main { flex: 1; }
    .bk-svc__name { font-family: var(--font-display); font-weight: 600; font-size: 1.3rem; color: var(--fg-1);
      line-height: 1; display: flex; align-items: center; gap: 9px; }
    .bk-svc__tag { font-family: var(--font-sans); font-size: 8px; letter-spacing: .16em; text-transform: uppercase;
      font-weight: 600; color: #fff; background: var(--grad-violet-soft); padding: 4px 8px; border-radius: 999px; }
    .bk-svc__blurb { font-size: .82rem; font-weight: 300; color: var(--fg-2); margin-top: 7px; line-height: 1.45; }
    .bk-svc__right { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; }
    .bk-svc__price { font-family: var(--font-display); font-weight: 600; font-size: 1.25rem; color: var(--violet-300); white-space: nowrap; }
    .bk-radio { width: 24px; height: 24px; border-radius: 999px; border: 1.5px solid var(--line-strong);
      display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; }
    .bk-radio.on { background: var(--grad-violet-soft); border-color: transparent; }

    .bk-dates { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; margin: 0 -24px; padding-left: 24px; padding-right: 24px; }
    .bk-dates::-webkit-scrollbar { height: 0; }
    .bk-date { flex: 0 0 auto; width: 60px; padding: 14px 0; border-radius: var(--radius-md); border: 1px solid var(--line);
      background: var(--ink-800); display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer;
      transition: border-color var(--dur-base), background var(--dur-base); position: relative; }
    .bk-date:hover { border-color: var(--line-strong); }
    .bk-date__dow { font-size: 9px; letter-spacing: .14em; color: var(--fg-3); }
    .bk-date__num { font-family: var(--font-display); font-weight: 600; font-size: 1.5rem; color: var(--fg-1); line-height: 1; }
    .bk-date__mo { font-size: 9px; letter-spacing: .14em; color: var(--fg-3); }
    .bk-date.sel { border-color: transparent; background: var(--grad-violet-soft); }
    .bk-date.sel .bk-date__dow, .bk-date.sel .bk-date__num, .bk-date.sel .bk-date__mo { color: #fff; }
    .bk-date.out { opacity: .32; cursor: not-allowed; pointer-events: none; }
    .bk-date.sug { border-color: rgba(231,198,107,.5); }
    .bk-date__star { position: absolute; top: 6px; right: 7px; color: #e7c66b; font-size: 11px; }
    .bk-date.sel .bk-date__star { color: #fff; }

    .bk-times { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .bk-time { padding: 14px 0; border-radius: var(--radius-sm); border: 1px solid var(--line); background: var(--ink-800);
      color: var(--fg-1); font-family: var(--font-mono); font-size: .95rem; cursor: pointer;
      transition: border-color var(--dur-base), background var(--dur-base); }
    .bk-time:hover { border-color: var(--line-strong); }
    .bk-time.sel { border-color: transparent; background: var(--grad-violet-soft); color: #fff; }
    .bk-time.out { opacity: .3; text-decoration: line-through; cursor: not-allowed; pointer-events: none; }

    .bk-form { padding-top: 6px; }
    .bk-field-wrap { display: block; margin-bottom: 18px; }
    .bk-field-label { font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--violet-400); display: block; margin-bottom: 8px; }
    .bk-field { display: flex; align-items: center; gap: 11px; background: var(--ink-800); border: 1px solid var(--line);
      border-radius: var(--radius-sm); padding: 14px 15px; transition: border-color var(--dur-base), box-shadow var(--dur-base); }
    .bk-field:focus-within { border-color: var(--violet-400); box-shadow: 0 0 0 3px var(--focus-ring); }
    .bk-field i { color: var(--fg-3); font-size: 18px; }
    .bk-field input { flex: 1; background: none; border: none; outline: none; color: var(--fg-1); font-family: var(--font-sans); font-size: 15px; }
    .bk-field input::placeholder { color: #6c5d7e; }
    .bk-policy { display: flex; gap: 11px; background: rgba(157,95,217,.08); border: 1px solid var(--line);
      border-radius: var(--radius-md); padding: 15px; margin-top: 8px; }
    .bk-policy i { color: var(--violet-400); font-size: 20px; flex: none; }
    .bk-policy span { font-size: .82rem; font-weight: 300; color: var(--fg-2); line-height: 1.5; }

    .bk-confirm { padding-top: 30px; display: flex; flex-direction: column; align-items: center; }
    .bk-confirm__badge { width: 78px; height: 78px; border-radius: 999px; background: var(--grad-violet-soft);
      display: flex; align-items: center; justify-content: center; color: #fff; font-size: 38px;
      box-shadow: var(--glow-violet); margin-bottom: 24px; }
    .bk-confirm__sub { font-size: .95rem; font-weight: 300; color: var(--fg-2); text-align: center; max-width: 30ch;
      margin: 12px auto 28px; line-height: 1.55; }
    .bk-receipt { width: 100%; background: var(--ink-800); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 6px 18px; }
    .bk-receipt__row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0;
      border-bottom: 1px solid var(--line); font-size: .9rem; }
    .bk-receipt__row:last-child { border-bottom: none; }
    .bk-receipt__row span { color: var(--fg-3); font-weight: 300; }
    .bk-receipt__row b { color: var(--fg-1); font-weight: 500; }
    .bk-receipt__total b { font-family: var(--font-display); font-size: 1.3rem; color: var(--violet-300); }

    .bk-bottom { padding: 16px 24px calc(16px + env(safe-area-inset-bottom)); border-top: 1px solid var(--line);
      background: linear-gradient(0deg, var(--ink-900), rgba(21,11,30,.8)); display: flex; align-items: center; gap: 14px; }
    .bk-summary { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .bk-summary__svc { font-size: .78rem; color: var(--fg-3); letter-spacing: .04em; }
    .bk-summary__price { font-family: var(--font-display); font-weight: 600; font-size: 1.35rem; color: var(--fg-1); }
    .bk-summary__hint { font-size: .82rem; color: var(--fg-3); font-weight: 300; }

    .bk-btn { display: inline-flex; align-items: center; justify-content: center; gap: 9px; border: none; cursor: pointer;
      font-family: var(--font-sans); font-weight: 500; font-size: 12.5px; letter-spacing: .14em; text-transform: uppercase;
      border-radius: 999px; transition: transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-base), opacity var(--dur-base); }
    .bk-btn--primary { background: var(--grad-violet-soft); color: #fff; padding: 16px 26px; box-shadow: 0 10px 28px -10px rgba(157,95,217,.6); }
    .bk-btn--primary:hover { transform: translateY(-2px); box-shadow: var(--glow-violet); }
    .bk-btn--primary:active { transform: scale(.98); }
    .bk-btn--primary:disabled { background: var(--ink-600); color: #6c5d7e; box-shadow: none; cursor: not-allowed; }
    .bk-btn--ghost { flex: 1; background: rgba(246,241,251,.05); color: var(--fg-1); padding: 16px 26px; border: 1px solid var(--line-strong); }
    .bk-btn--ghost:hover { background: rgba(157,95,217,.16); border-color: var(--violet-400); }

    .bk-cancel-link { margin-top: 22px; background: none; border: none; cursor: pointer; color: var(--fg-3);
      font-family: var(--font-sans); font-size: 12px; letter-spacing: .06em; font-weight: 300;
      display: inline-flex; align-items: center; gap: 7px; padding: 6px 4px;
      border-bottom: 1px solid transparent; transition: color var(--dur-base), border-color var(--dur-base); }
    .bk-cancel-link:hover { color: #e89aa8; border-bottom-color: rgba(232,154,168,.5); }
    .bk-cancel-link i { font-size: 15px; }

    .bk-confirm__badge--cancel { background: var(--ink-700); border: 1px solid var(--line-strong); color: #e89aa8; box-shadow: none; }

    .bk-sheet-scrim { position: absolute; inset: 0; z-index: 20; background: rgba(8,4,14,.62);
      backdrop-filter: blur(3px); display: flex; align-items: flex-end; animation: bk-fade var(--dur-base) var(--ease-out); }
    @keyframes bk-fade { from { opacity: 0; } to { opacity: 1; } }
    .bk-sheet { width: 100%; background: var(--ink-800); border-top: 1px solid var(--line-strong);
      border-radius: 26px 26px 38px 38px; padding: 26px 24px calc(24px + env(safe-area-inset-bottom));
      animation: bk-rise var(--dur-base) var(--ease-out); }
    @keyframes bk-rise { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .bk-sheet__grip { width: 38px; height: 4px; border-radius: 999px; background: var(--ink-600); margin: 0 auto 20px; }
    .bk-sheet__icon { width: 54px; height: 54px; border-radius: 999px; background: rgba(232,154,168,.12);
      border: 1px solid rgba(232,154,168,.3); display: flex; align-items: center; justify-content: center;
      color: #e89aa8; font-size: 26px; margin-bottom: 16px; }
    .bk-sheet__title { font-family: var(--font-display); font-weight: 600; font-size: 1.45rem; color: var(--fg-1); line-height: 1.1; }
    .bk-sheet__body { font-size: .88rem; font-weight: 300; color: var(--fg-2); line-height: 1.55; margin: 10px 0 6px; }
    .bk-sheet__policy { display: flex; gap: 10px; background: rgba(232,154,168,.07); border: 1px solid var(--line);
      border-radius: var(--radius-md); padding: 13px 14px; margin: 16px 0 22px; }
    .bk-sheet__policy i { color: #e89aa8; font-size: 18px; flex: none; }
    .bk-sheet__policy span { font-size: .8rem; font-weight: 300; color: var(--fg-2); line-height: 1.45; }
    .bk-sheet__actions { display: flex; flex-direction: column; gap: 10px; }
    .bk-btn--danger { background: #b54a5c; color: #fff; padding: 16px 26px; width: 100%; }
    .bk-btn--danger:hover { transform: translateY(-2px); box-shadow: 0 12px 28px -12px rgba(181,74,92,.7); }
    .bk-btn--text { background: none; color: var(--fg-2); padding: 13px; width: 100%; letter-spacing: .1em; }
    .bk-btn--text:hover { color: var(--fg-1); }

    .bk-manage-entry { width: 100%; display: flex; align-items: center; gap: 13px; background: var(--ink-800);
      border: 1px solid var(--line); border-radius: var(--radius-md); padding: 14px 16px; margin-bottom: 22px;
      cursor: pointer; text-align: left; transition: border-color var(--dur-base), background var(--dur-base); }
    .bk-manage-entry:hover { border-color: var(--line-strong); background: var(--ink-700); }
    .bk-manage-entry .lead { font-size: 21px; color: var(--violet-300); flex: none; }
    .bk-manage-entry .m { flex: 1; min-width: 0; }
    .bk-manage-entry .m b { display: block; font-size: .92rem; color: var(--fg-1); font-weight: 500; letter-spacing: .01em; }
    .bk-manage-entry .m span { font-size: .78rem; color: var(--fg-3); font-weight: 300; }
    .bk-manage-entry .go { color: var(--fg-3); font-size: 16px; flex: none; }

    .bk-appt { width: 100%; background: var(--ink-800); border: 1px solid var(--line); border-radius: var(--radius-md); overflow: hidden; margin-bottom: 6px; }
    .bk-appt__top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
      padding: 18px; background: linear-gradient(180deg, rgba(157,95,217,.12), transparent); }
    .bk-appt__name { font-family: var(--font-display); font-weight: 600; font-size: 1.4rem; color: var(--fg-1);
      line-height: 1; display: flex; align-items: center; gap: 9px; }
    .bk-appt__price { font-family: var(--font-display); font-weight: 600; font-size: 1.25rem; color: var(--violet-300); white-space: nowrap; }
    .bk-appt__rows { padding: 4px 18px 8px; }
    .bk-appt__row { display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--line); font-size: .9rem; color: var(--fg-1); }
    .bk-appt__row:last-child { border-bottom: none; }
    .bk-appt__row i { color: var(--violet-400); font-size: 18px; flex: none; }
    .bk-appt__row span { color: var(--fg-3); font-weight: 300; margin-left: auto; }
    .bk-status-pill { display: inline-flex; align-items: center; gap: 7px; font-size: 10px; letter-spacing: .16em;
      text-transform: uppercase; font-weight: 500; color: #7fd1a8; background: rgba(127,209,168,.1);
      border: 1px solid rgba(127,209,168,.28); border-radius: 999px; padding: 7px 13px; margin: 16px 0 4px; }
    .bk-status-pill--resched { color: #cbb2ff; background: rgba(157,95,217,.12); border-color: rgba(157,95,217,.34); }
    .bk-detail-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 22px; }
    .bk-btn--outline-danger { width: 100%; background: none; color: #e89aa8; border: 1px solid rgba(232,154,168,.4); padding: 15px; }
    .bk-btn--outline-danger:hover { background: rgba(232,154,168,.08); border-color: #e89aa8; }

    .bk-dt__hint { font-size: .86rem; font-weight: 300; color: var(--fg-3); line-height: 1.5;
      padding: 14px 16px; border: 1px dashed var(--line); border-radius: var(--radius-md); margin-top: 6px; }
    .bk-host-btn { width: 38px; height: 38px; border-radius: 999px; border: 1px solid var(--line); background: transparent;
      color: var(--fg-3); font-size: 17px; display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: color var(--dur-base), border-color var(--dur-base), background var(--dur-base); }
    .bk-host-btn:hover { color: var(--violet-300); border-color: var(--violet-400); background: rgba(157,95,217,.1); }

    .hv-summary { display: inline-flex; align-items: center; gap: 8px; margin: 16px 0 6px; font-size: 11px;
      letter-spacing: .14em; text-transform: uppercase; color: var(--violet-300); font-weight: 500; }
    .hv-day { border: 1px solid var(--line); border-radius: var(--radius-md); margin-bottom: 10px; overflow: hidden; background: var(--ink-800); }
    .hv-day.closed { opacity: .72; }
    .hv-day__head { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 12px;
      background: none; border: none; cursor: pointer; padding: 15px 16px; color: var(--fg-1); }
    .hv-day__date { font-family: var(--font-sans); font-size: 1rem; color: var(--fg-2); letter-spacing: .02em; }
    .hv-day__date b { font-family: var(--font-display); font-weight: 600; font-size: 1.1rem; color: var(--fg-1); margin-right: 4px; }
    .hv-day__meta { display: flex; align-items: center; gap: 12px; color: var(--fg-3); }
    .hv-pill { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; font-weight: 500;
      color: var(--fg-3); background: var(--ink-700); border: 1px solid var(--line); border-radius: 999px; padding: 6px 11px; }
    .hv-pill.on { color: #7fd1a8; background: rgba(127,209,168,.1); border-color: rgba(127,209,168,.28); }
    .hv-day__body { padding: 2px 16px 16px; border-top: 1px solid var(--line); }
    .hv-times { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 14px; }
    .hv-time { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 0;
      border-radius: var(--radius-sm); border: 1px solid var(--line); background: var(--ink-900);
      color: var(--fg-2); font-family: var(--font-mono); font-size: .9rem; cursor: pointer;
      transition: border-color var(--dur-base), background var(--dur-base), color var(--dur-base); }
    .hv-time:hover { border-color: var(--line-strong); }
    .hv-time.on { border-color: transparent; background: var(--grad-violet-soft); color: #fff; }
    .hv-quick { display: flex; gap: 10px; margin-top: 12px; }
    .hv-quick button { flex: 1; background: rgba(246,241,251,.04); border: 1px solid var(--line); border-radius: 999px;
      padding: 11px; color: var(--fg-2); font-family: var(--font-sans); font-size: 11px; letter-spacing: .12em;
      text-transform: uppercase; cursor: pointer; transition: background var(--dur-base), color var(--dur-base); }
    .hv-quick button:hover { background: rgba(157,95,217,.14); color: var(--fg-1); }
    .hv-quick button.on { background: rgba(157,95,217,.2); color: #fff; border-color: transparent; }
    .hv-quick button:disabled { opacity: .4; cursor: not-allowed; }
    .hv-day__star { color: #e7c66b; font-size: 14px; margin-right: 6px; }
    .hv-tabs { display: flex; gap: 8px; margin-top: 16px; background: var(--ink-800); border: 1px solid var(--line); border-radius: 999px; padding: 4px; }
    .hv-tab { flex: 1; background: none; border: none; cursor: pointer; padding: 9px; border-radius: 999px;
      font-family: var(--font-sans); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; font-weight: 500;
      color: var(--fg-3); transition: background var(--dur-base), color var(--dur-base); }
    .hv-tab.on { background: var(--grad-violet-soft); color: #fff; }
    .hv-promo { border: 1px solid var(--line); border-radius: var(--radius-md); padding: 14px; margin-bottom: 12px;
      background: var(--ink-800); display: flex; flex-direction: column; gap: 9px; transition: border-color var(--dur-base), opacity var(--dur-base); }
    .hv-promo:not(.on) { opacity: .62; }
    .hv-promo.on { border-color: var(--line-strong); }
    .hv-promo__top { display: flex; align-items: center; gap: 11px; }
    .hv-switch { width: 42px; height: 24px; border-radius: 999px; border: none; background: var(--ink-600); cursor: pointer; padding: 3px; display: flex; transition: background var(--dur-base); }
    .hv-switch.on { background: var(--violet-500); }
    .hv-switch__dot { width: 18px; height: 18px; border-radius: 999px; background: #fff; transition: transform var(--dur-base) var(--ease-out); }
    .hv-switch.on .hv-switch__dot { transform: translateX(18px); }
    .hv-promo__state { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; font-weight: 500; color: var(--fg-3); }
    .hv-promo.on .hv-promo__state { color: #7fd1a8; }
    .hv-promo__del { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--fg-3); font-size: 18px; transition: color var(--dur-base); }
    .hv-promo__del:hover { color: #e89aa8; }
    .hv-input { width: 100%; background: var(--ink-900); border: 1px solid var(--line); border-radius: var(--radius-sm);
      padding: 11px 13px; color: var(--fg-1); font-family: var(--font-sans); font-size: 14px; outline: none; transition: border-color var(--dur-base); }
